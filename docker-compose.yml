services:
  faircom-edge:
    build: .
    image: faircom-edge-licensed
    container_name: faircom-edge
    restart: unless-stopped
    ports:
      - "8080:8080"   # REST / JSON API
      - "1883:1883"   # MQTT
      - "9001:9001"   # MQTT WebSocket
      - "6597:6597"   # FairCom native
    volumes:
      - ./data:/opt/faircom/data
      - ./config:/opt/faircom/config
      - ./libs:/opt/faircom/server/integration
      - ./license/ctsrvr56111112.lic:/opt/faircom/server/ctsrvr56111112.lic
    healthcheck:
      test: ["CMD", "bash", "-c", "(echo > /dev/tcp/localhost/8080)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s


